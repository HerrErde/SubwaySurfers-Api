syntax = "proto3";

package player.ext.v1;

message Empty {}

message Time {
  uint64 sec = 1;
  uint64 nsec = 2;
}

message InviteQuota {
  uint64 max_friends = 1;
  uint64 friend_count = 2;
  uint64 send_invite_count = 3;
  uint64 received_invite_count = 4;
  uint64 max_invites = 5;
}

message PlayerRequest {
  string player = 1;
}

message UpdatePlayerRequest {
  string name = 1;
  uint64 level = 2;
  uint64 highscore = 3;
  map<string, string> metadata = 4;
}

message UserInfo {
  string uuid = 1;
  UserData user_data = 2;
}

message UserData {
  string name = 1;
  string tag = 2;
  uint64 level = 3;
  uint64 highscore = 4;
  map<string, string> metadata = 5;
  Time created_at = 6;
  Time updated_at = 7;
  Time name_changed_at = 8;
  string uuid = 9;
  Time name_change_expires_at = 10;
}

message PlayerResponse {
  repeated UserData user_data = 1;
}

message InviteUserUuid { // The user the invite is sent to
  string user_uuid = 1;
}

message ReceivedInvite {
  string action_uuid = 1;
  InviteUserUuid received_uuid = 2;
  UserInfo user_info = 3;
  Time invited_at = 4;
}

message SendInvite {
  string action_uuid = 1;
  UserInfo user_info = 2;
  InviteUserUuid received_uuid = 3;
  Time invited_at = 4;
}

message GetInvitesResponse {
  repeated ReceivedInvite received_invites = 1; // received invites
  repeated SendInvite sent_invites = 2; // sent invites
  InviteQuota quota = 3;
}

message SendInviteResponse {
  message UserInvite {
    string action_uuid = 1;
    UserInfo invited = 2;
    UserInfo inviter = 3;
    Time invited_at = 4;
  }

  UserInvite user_invite = 1;
}

message GetFriendsResponse {
  repeated UserInfo friend = 1;
  InviteQuota quota = 2;
}

message GetRelationshipResponse {
  message Status {
    uint64 status = 1;
  }
  Status status = 1;
}

message GetWalletResponse {
  message WalletData {
    map<string, uint64> items =  1;
    Time updated_at = 2;
  }
  WalletData walletdata = 1;
}

message GetFriendAndInvitesResponse {
  repeated UserInfo friends = 1;
  repeated ReceivedInvite received_invites = 2;
  repeated SendInvite sent_invites = 3;
  InviteQuota quota = 4;
}