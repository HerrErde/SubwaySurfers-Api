syntax = "proto3";

package player.ext.v1;

message Empty {}

message Time {
  uint64 sec = 1;
  uint64 nsec = 2;
}

message InviteQuota {
  uint64 max_friends = 1;
  uint64 friend_count = 2;
  uint64 send_invite_count = 3;
  uint64 received_invite_count = 4;
  uint64 max_invites = 5;
}

message PlayerRequest {
  string player = 1;
}

message UpdatePlayerRequest {
  string name = 1;
  optional uint64 level = 2;
  optional uint64 highscore = 3;
  map<string, string> metadata = 4;
}

message UserInfo {
  string uuid = 1;
  UserData user_data = 2;
}

message UserData {
  string name = 1;
  string tag = 2;
  uint64 level = 3;
  uint64 highscore = 4;
  map<string, string> metadata = 5;
  Time created_at = 6;
  Time updated_at = 7;
  Time renamed_at = 8;
  string uuid = 9;
  Time renameble_at = 10;
}

message PlayerResponse {
  repeated UserData user_data = 1;
}

message InviteUserUuid { // The user the invite is sent to
  string user_uuid = 1;
}

message ReceivedInvite {
  string action_uuid = 1;
  InviteUserUuid received_uuid = 2;
  UserInfo user_info = 3;
  Time invited_at = 4;
}

message SendInvite {
  string action_uuid = 1;
  UserInfo user_info = 2;
  InviteUserUuid received_uuid = 3;
  Time invited_at = 4;
}

message GetInvitesResponse {
  repeated ReceivedInvite received_invites = 1;
  repeated SendInvite sent_invites = 2;
  InviteQuota quota = 3;
}

message SendInviteResponse {
  message UserInvite {
    string action_uuid = 1;
    UserInfo invited = 2;
    UserInfo inviter = 3;
    Time invited_at = 4;
  }

  UserInvite user_invite = 1;
}

message GetFriendsResponse {
  repeated UserInfo friends = 1;
  InviteQuota quota = 2;
}

message GetRelationshipResponse {
  message Status {
    uint64 status = 1;
  }
  Status status = 1;
}

message GetWalletResponse {
  message WalletData {
    map<string, uint64> items =  1;
    Time updated_at = 2;
  }
  WalletData walletdata = 1;
}

message GetFriendAndInvitesResponse {
  repeated UserInfo friends = 1;
  repeated ReceivedInvite received_invites = 2;
  repeated SendInvite sent_invites = 3;
  InviteQuota quota = 4;
}

message ConfigResponse {
  message ConfigData {
    message UsernameRules {
      message CharRange {
        uint32 min = 1;
        uint32 max = 2;
      }

      string allowed_regex = 3;
      repeated CharRange allowed_ranges = 4;
    }

    UsernameRules username = 6;
  }

  ConfigData config = 1;
}

message TournamentRequest {
  message Tournament {
    string id = 1;
  }
  message TournamentConfig {
    string type = 1;
    string locale = 2;
  }

  Tournament tournament = 1;
  optional TournamentConfig tournamentconfig = 2;
}

message TournamentResponse {
  message Tournament {
    string tournament = 1;
  }

  message TournamentTime {
    message TournamentTimeInner {
      uint64 time = 1;
    }

    TournamentTimeInner start = 1;
    TournamentTimeInner end = 2;
  }

  message TournamentPlayer {
    message TournamentPlayerInner {
      string uuid = 1;
      uint64 position = 2;
      uint64 trophies = 3;
      UserData user_data = 5;
    }
    TournamentPlayerInner self = 1;
    repeated TournamentPlayerInner opponents = 2;
  }

  message TournamentInfo {
    string rank = 1;
    uint64 value2 = 2;
    uint64 amount = 3;
  }

  Tournament tournament = 1;
  TournamentTime tournament_time = 2;
  TournamentPlayer players = 3;
  repeated TournamentInfo items = 4;
}

message SubmitScoreRequest {
  message SubmitTournament {
    string id = 1;
  }

  message TournamentGame {
    message GameTime {
      uint64 sec = 1;
    }
    uint64 score = 1;
    GameTime time = 2;
    Time submit_at = 3;
  }

  message TournamentConfig {
    string type = 1;
    string locale = 2;
  }

  SubmitTournament tournament = 1;
  TournamentGame tournamentscore = 2;
  TournamentConfig tournamenttype = 3;
}